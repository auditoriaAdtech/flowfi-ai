version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flowfi-db
    environment:
      POSTGRES_USER: flowfi
      POSTGRES_PASSWORD: flowfi_secret
      POSTGRES_DB: flowfi
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flowfi-redis
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: flowfi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: flowfi
      MINIO_ROOT_PASSWORD: flowfi_secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
